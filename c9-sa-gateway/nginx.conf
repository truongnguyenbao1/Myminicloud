events {}
http {
  server {
    listen 80;
    server_name tnb.io.vn www.tnb.io.vn localhost;

    # Web tĩnh
    location / {
      proxy_pass http://c1-sa-web:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # App API
    location /api/ {
      proxy_pass http://c2-sa-app:8081/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keycloak
    location /auth/ {
      proxy_pass http://c4-sa-auth:8080/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # HTTPS configuration (giữ lại để sử dụng khi cần)
  server {
    listen 443 ssl;
    server_name tnb.io.vn www.tnb.io.vn;

    ssl_certificate /etc/letsencrypt/live/tnb.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tnb.io.vn/privkey.pem;

    location / {
      proxy_pass http://c1-sa-web:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://c2-sa-app:8081/;
      proxy_set_header Host $host;
    }

    location /auth/ {
      proxy_pass http://c4-sa-auth:8080/;
      proxy_set_header Host $host;
    }
  }
}
