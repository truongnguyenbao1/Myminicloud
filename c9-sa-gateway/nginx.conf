events {}
http {
  # Tự động chuyển hướng từ HTTP sang HTTPS
  server {
    listen 80;
    server_name tnb.io.vn www.tnb.io.vn;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name tnb.io.vn www.tnb.io.vn;

    # Đường dẫn chứng chỉ SSL (đã mount từ host qua docker-compose)
    ssl_certificate /etc/letsencrypt/live/tnb.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tnb.io.vn/privkey.pem;

    # Tối ưu SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy tới web frontend
    location / {
      proxy_pass http://c1-sa-web:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
