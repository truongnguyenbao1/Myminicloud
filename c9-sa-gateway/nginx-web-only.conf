events {}
http {
  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name tnb.io.vn www.tnb.io.vn;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name tnb.io.vn www.tnb.io.vn;

    ssl_certificate /etc/letsencrypt/live/tnb.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tnb.io.vn/privkey.pem;

    # Web tĩnh
    location / {
      proxy_pass http://c1-sa-web:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API & Auth are disabled in web-only mode
    # If you want to re-enable them, uncomment below and add services back to docker-compose
    /*
    location /api/ {
      proxy_pass http://c2-sa-app:8081/;
      ...
    }
    */
  }
}
