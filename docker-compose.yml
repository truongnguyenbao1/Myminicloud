networks: { cloud-net: { name: cloud-net } }

services:
  c1-sa-web:
    build: ./c1-sa-web
    image: hotensv/web:dev
    container_name: c1-sa-web
    networks: [ cloud-net ]
    ports: [ "8080:80" ]

  c2-sa-app:
    build: ./c2-sa-app
    image: hotensv/app:dev
    container_name: c2-sa-app
    networks: [ cloud-net ]
    ports: [ "8085:8081" ]
    environment:
      OIDC_ISSUER: "http://c4-sa-auth:8080/realms/master"
      OIDC_AUDIENCE: "myapp"

  c3-sa-db:
    image: mariadb:11
    container_name: c3-sa-db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: minicloud
    volumes:
      - ./c3-sa-db/init:/docker-entrypoint-initdb.d:ro
    ports: [ "3306:3306" ]
    networks: [ cloud-net ]

  c4-sa-auth:
    image: quay.io/keycloak/keycloak:latest
    container_name: c4-sa-auth
    command: [ "start-dev" ]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: "Public-IP-EC2"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports: [ "8081:8080" ]
    restart: unless-stopped
    networks: [ cloud-net ]

  c5-sa-storage:
    image: minio/minio
    container_name: c5-sa-storage
    command: [ "server", "/data", "--console-address", ":9001" ]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./c5-sa-storage/data:/data
    ports: [ "9000:9000", "9001:9001" ]
    networks: [ cloud-net ]

  c6-sa-dns:
    image: internetsystemsconsortium/bind9:9.18
    container_name: c6-sa-dns
    user: root

    ports: [ "1053:53/udp" ]
    volumes:
      - ./c6-sa-dns/named.conf:/etc/bind/named.conf:ro
      - ./c6-sa-dns/named.conf.local:/etc/bind/named.conf.local:ro
      - ./c6-sa-dns/db.myminicloud.local:/etc/bind/db.myminicloud.local:ro
    networks: [ cloud-net ]

  c7-sa-exporter:
    image: prom/node-exporter:latest
    container_name: c7-sa-exporter
    ports: [ "9100:9100" ]
    networks: [ cloud-net ]

  c7-sa-prometheus:
    image: prom/prometheus:latest
    container_name: c7-sa-prometheus
    ports: [ "9090:9090" ]
    volumes:
      - ./c7-sa-prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [ cloud-net ]

  c8-sa-grafana:
    image: grafana/grafana:latest
    container_name: c8-sa-grafana
    ports: [ "3000:3000" ]
    volumes:
      - ./c8-sa-grafana/provisioning:/etc/grafana/provisioning
    networks: [ cloud-net ]

  c9-sa-gateway:
    image: nginx:stable
    container_name: c9-sa-gateway
    depends_on:
      - c1-sa-web
      - c2-sa-app
      - c4-sa-auth
    ports: [ "80:80" ]
    volumes:
      - ./c9-sa-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [ cloud-net ]
    restart: unless-stopped
